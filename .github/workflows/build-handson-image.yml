name: Build Handson Image

# ハンズオン配布用コンテナイメージのビルド確認用ワークフロー。
# イメージ構成に関わるファイルが変更された push / pull_request でのみ実行し、
# GHCR への公開は行わない（公開は publish-handson-image.yml で Release-v* タグを契機に実施）。

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-handson-image.yml'
  pull_request:
    paths:
      - 'infra/docker/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-handson-image.yml'
  workflow_dispatch:

permissions:
  contents: read

# Node.js 20 actions deprecation への先行対応（2026-06-02 以降 Node.js 24 が既定）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx のセットアップ
        uses: docker/setup-buildx-action@v3

      - name: イメージのビルド（公開なし）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          load: false
          tags: ghcr.io/${{ github.repository_owner }}/handson-env:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
