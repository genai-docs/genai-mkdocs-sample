name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-site.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:
    inputs:
      purpose:
        description: '実行目的'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 本番デプロイ条件: main push または workflow_dispatch で production 選択
      IS_PRODUCTION: ${{ (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.purpose == 'production') }}
      # 同一リポジトリからの PR か（fork PR でない）
      IS_SAME_REPO_PR: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: pnpm のインストール
        uses: pnpm/action-setup@v4

      - name: uv のセットアップ
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Node.js 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: 依存関係の同期
        run: uv sync --frozen

      - name: Playwright ブラウザのインストール
        if: env.IS_PRODUCTION == 'true'
        run: uv run python -m playwright install chromium

      - name: PDF 依存関係のインストール
        if: env.IS_PRODUCTION == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 libffi-dev fonts-noto-cjk fonts-noto-cjk-extra

      - name: Marp CLI を使ってスライドをビルド
        run: pnpm exec marp -c docs/スライド/.marprc.yml -I docs/スライド -o docs/スライド

      - name: サイトのビルド (Web)
        if: env.IS_PRODUCTION == 'true'
        env:
          RENDER_SVG: "1" # Mermaid
        run: uv run mkdocs build

      # PDF内の画像はSVGのままだとPDF生成時に文字化けなどの問題が発生するため、PDF生成時のみPNGも出力する
      # ただ、WebサイトはSVGで出力することで、拡大縮小などで画質が劣化しない為、サイトとPDFでビルドを分ける
      - name: サイトのビルド (PDF)
        if: env.IS_PRODUCTION == 'true'
        env:
          RENDER_SVG: "1"
          RENDER_PNG: "1"
          ENABLE_PDF: "1"
        run: |
          # PDF生成用に別ディレクトリへビルド
          uv run mkdocs build -d site-pdf
          # 生成されたPDFをWeb用ディレクトリへコピー
          mkdir -p site/pdf
          cp site-pdf/pdf/*.pdf site/pdf/

      - name: サイトのビルド (プレビュー)
        if: env.IS_PRODUCTION != 'true'
        run: uv run mkdocs build

      - name: Azure へ OIDC ログイン
        if: env.IS_SAME_REPO_PR == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Blob Storage 静的サイトへデプロイ
        if: env.IS_SAME_REPO_PR == 'true'
        continue-on-error: ${{ env.IS_PRODUCTION != 'true' }}
        id: deploy-blob
        uses: nuitsjp/azure-blob-storage-site-deploy@85313d1c4258fa3da643d3d3004a98a28818fc68 # main (no tagged release yet)
        with:
          action: deploy
          storage_account: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          source_dir: ./site
          branch_name: ${{ github.head_ref || github.ref_name }}
          pull_request_number: ${{ github.event.pull_request.number }}

      - name: デプロイ URL を Workflow Summary に出力
        if: success() && steps.deploy-blob.outputs.site_url != ''
        run: |
          site_url="${{ steps.deploy-blob.outputs.site_url }}"
          {
            echo "## Deployment URL"
            echo "- URL: [${site_url}](${site_url})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: GitHub Pages 用アーティファクトのアップロード
        if: env.IS_PRODUCTION == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # GitHub Pages へのデプロイは別ジョブとして分離
  # 理由:
  # 1. environment 設定により GitHub UI の Environments でデプロイ状況を追跡可能
  # 2. デプロイ失敗時に build を再実行せずデプロイのみリトライ可能
  # 3. GitHub 公式の推奨パターンに準拠
  deploy-github-pages:
    needs: build
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.purpose == 'production')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
