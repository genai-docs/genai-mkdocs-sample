name: Publish Handson Image

# Release-v<semver> タグの push を契機にハンズオン配布用コンテナイメージを GHCR へ公開する。
# 手動発行（workflow_dispatch）では version を明示的に指定可能。
#
# 前提:
# - リポジトリ設定 > Actions > General > Workflow permissions が
#   "Read and write permissions" に設定されていること（packages: write の付与に必要）
# - 初回公開後、GHCR のパッケージ設定画面で当リポジトリへのアクセスを許可し、
#   必要に応じて可視性 (public / internal / private) を調整すること

on:
  push:
    tags:
      - 'Release-v*'
  workflow_dispatch:
    inputs:
      version:
        description: '公開するバージョン (例: 1.1.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: バージョン決定
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/Release-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/Release-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "バージョン形式が不正です: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "公開バージョン: ${VERSION}"

      - name: Docker Buildx のセットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCR へログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: イメージのビルドとプッシュ
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/handson-env:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/handson-env:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
