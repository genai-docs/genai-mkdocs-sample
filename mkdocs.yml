site_name: 生成AI時代のドキュメント基盤
site_description: Best practices for business system documentation and a collection of Mermaid diagram samples
site_author: Documentation Team
copyright: Copyright &copy; 2024 @nuits.jp

nav:
  - ホーム: index.md
  - ユーザーガイド: usage-guide.md
  - 技術スタック: tech-stack.md
  - 実行環境:
      - 概要: 実行環境/index.md
      - クラウド環境構築: 実行環境/cloud-resources-setup.md
      - ハンズオン環境設計: 実行環境/handson.md
      - ハンズオン環境情報: 実行環境/environment.md
  - ハンズオン準備:
      - 概要: ハンズオン準備/index.md
      - VS Code の初期化: ハンズオン準備/01.vscode.md
      - GitHub リポジトリの準備: ハンズオン準備/02.github.md
      - Claude Code のサインイン: ハンズオン準備/03.claude-code.md
      - Cursor CLI のサインイン: ハンズオン準備/04.cursor.md
      - Codex CLI のサインイン: ハンズオン準備/05.codex.md
      - GitHub Copilot CLI のサインイン: ハンズオン準備/06.copilot.md
  - アーキテクチャー:
      - 概要: アーキテクチャー/index.md
      - ワークフロー アーキテクチャ: アーキテクチャー/workflow-architecture.md
      - テキスト検証: アーキテクチャー/text-validation.md
  - サンプル:
      - 目次: サンプル/index.md
      - Mermaid: サンプル/mermaid.md
      - Draw.io: サンプル/draw-io.md
      - Marp: サンプル/marp.md
      - Marp サンプル: サンプル/marp-sample.md
  - スライド:
      - 一覧: スライド/index.md
      - 生成AI時代のドキュメント基盤: スライド/genai-documentation-infrastructure.md
      - Marp: スライド/marp.md

theme:
  name: material
  language: ja
  features:
    - content.code.copy

extra_css:
  - stylesheets/extra.css
  - stylesheets/pdf-fixes.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight
  - toc:
      permalink: true

watch:
  - docs
  - mkdocs.yml

plugins:
  - search
  - mermaid-to-svg:
      enabled_if_env: RENDER_SVG
      image_id_enabled: true
      image_id_prefix: mermaid-diagram
      # Disable HTML labels for PDF compatibility
      mermaid_config:
        htmlLabels: false
        flowchart:
          htmlLabels: false
        class:
          htmlLabels: false
  - svg-to-png:
      enabled_if_env: RENDER_PNG
  - to-pdf:
      cover_subtitle: 'ドキュメンテーション戦略'
      toc_title: 目次
      toc_level: 3
      output_path: pdf/ドキュメンテーション戦略.pdf
      enabled_if_env: ENABLE_PDF
  - table-reader:
      enabled: true
